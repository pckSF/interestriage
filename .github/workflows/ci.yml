name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff # v6

      - name: Install JS dependencies
        run: npm ci

      - name: Install Python dependencies
        run: uv sync --frozen --extra dev

      - name: Run pre-commit checks
        run: uvx pre-commit run --all-files --show-diff-on-failure

      - name: Lint and type-check
        run: |
          npm run lint
          npm run typecheck
          uv run ruff check .
          uv run ruff format --check .

      - name: Run tests
        run: uv run pytest -q

      - name: Audit JS dependencies
        run: npm audit --audit-level=high

      - name: Audit Python dependencies
        run: uv run pip-audit --ignore-vuln CVE-2026-3219

      - name: Generate SBOM
        run: |
          uv run python scripts/generate_sbom.py

      - name: Build dashboard and extension
        run: |
          npm run build -w shared
          npm run build -w web
          npm run build -w extension

      - name: Build backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: infra/Dockerfile.backend
          push: false
          tags: interestriage/backend:ci
