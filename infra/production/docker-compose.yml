services:
  backend:
    image: interestriage/backend:${IMAGE_TAG:-dev}
    environment:
      INTERESTRIAGE_MODE: server
      API_BIND_HOST: 0.0.0.0
      API_PORT: 8000
      RATE_LIMIT_PER_MINUTE: 60
      EXTERNAL_FETCH_ENABLED: "true"
    volumes:
      - ./data:/var/lib/interestriage
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - interestriage

  worker:
    image: interestriage/backend:${IMAGE_TAG:-dev}
    command: ["python", "-m", "interestriage_worker.worker"]
    environment:
      INTERESTRIAGE_MODE: server
      TTS_ADAPTER: ${TTS_ADAPTER:-coqui}
    volumes:
      - ./data:/var/lib/interestriage
    depends_on:
      backend:
        condition: service_started
    networks:
      - interestriage

  parser-sandbox:
    image: interestriage/backend:${IMAGE_TAG:-dev}
    command: ["python", "-m", "interestriage_worker.parser_sandbox"]
    environment:
      INTERESTRIAGE_MODE: server
      PARSER_CPU_QUOTA: "0.50"
      PARSER_MEMORY_LIMIT: 256m
      PARSER_MAX_OUTPUT_BYTES: "2000000"
    mem_limit: 256m
    cpus: 0.50
    depends_on:
      backend:
        condition: service_started
    networks:
      - interestriage

  dashboard:
    image: interestriage/dashboard:${IMAGE_TAG:-dev}
    expose:
      - "8080"
    networks:
      - interestriage

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: interestriage
      POSTGRES_USER: interestriage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interestriage -d interestriage"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interestriage

  proxy:
    image: caddy:2.8-alpine
    depends_on:
      backend:
        condition: service_started
      dashboard:
        condition: service_started
    environment:
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME:?set PUBLIC_HOSTNAME}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:?set LETSENCRYPT_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - interestriage

volumes:
  db-data:
  caddy-data:
  caddy-config:

networks:
  interestriage:
    driver: bridge
