services:
  backend:
    image: interestriage/backend:${IMAGE_TAG:-dev}
    build:
      context: ../..
      dockerfile: infra/Dockerfile.backend
    environment:
      INTERESTRIAGE_MODE: local
      API_BIND_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: http://localhost:8080
      RATE_LIMIT_PER_MINUTE: 240
      EXTERNAL_FETCH_ENABLED: "false"
      TTS_ADAPTER: stub
    volumes:
      - ./data:/var/lib/interestriage
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - interestriage

  worker:
    image: interestriage/backend:${IMAGE_TAG:-dev}
    command: ["python", "-m", "interestriage_worker.worker"]
    environment:
      INTERESTRIAGE_MODE: local
      TTS_ADAPTER: stub
    volumes:
      - ./data:/var/lib/interestriage
    depends_on:
      backend:
        condition: service_started
    networks:
      - interestriage

  parser-sandbox:
    image: interestriage/backend:${IMAGE_TAG:-dev}
    command: ["python", "-m", "interestriage_worker.parser_sandbox"]
    environment:
      INTERESTRIAGE_MODE: local
      PARSER_CPU_QUOTA: "0.50"
      PARSER_MEMORY_LIMIT: 256m
      PARSER_MAX_OUTPUT_BYTES: "2000000"
    mem_limit: 256m
    cpus: 0.50
    depends_on:
      backend:
        condition: service_started
    networks:
      - interestriage

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: interestriage
      POSTGRES_USER: interestriage
      POSTGRES_PASSWORD: interestriage
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interestriage -d interestriage"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - "5432"
    networks:
      - interestriage

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../web/dist:/usr/share/nginx/html:ro
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - interestriage

  evil-server:
    image: interestriage/evil-server:${IMAGE_TAG:-dev}
    build:
      context: ./evil-server
      dockerfile: Dockerfile
    profiles: ["security-tests"]
    expose:
      - "8081"
    networks:
      - interestriage

volumes:
  db-data:

networks:
  interestriage:
    driver: bridge
