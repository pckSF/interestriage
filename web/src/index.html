<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interestriage Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f4ec;
        --fg: #17231d;
        --accent: #1f6d5c;
      }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #fff8df, var(--bg));
        color: var(--fg);
      }

      main {
        max-width: 760px;
        margin: 3rem auto;
        padding: 2rem;
        background: #ffffffd9;
        border: 1px solid #d9d6c7;
        border-radius: 16px;
      }

      h1 {
        margin-top: 0;
      }

      .pill {
        display: inline-block;
        padding: 0.3rem 0.65rem;
        border-radius: 999px;
        background: #d6efe8;
        color: var(--accent);
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <main>
      <span class="pill">Stage 0 Baseline</span>
      <h1>Interestriage Dashboard</h1>
      <p id="status">Checking backend health...</p>
    </main>
    <script type="module" src="./assets/main.js"></script>
  </body>
</html>
